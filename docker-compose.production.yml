services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db.production
    image: mandringo02/demo-cemetery:db
    container_name: cimitero-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: omeka_s
      MYSQL_USER: omeka_user
      MYSQL_PASSWORD: omeka_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  omeka-app:
    build:
      context: .
      dockerfile: Dockerfile.omeka.production
    image: mandringo02/demo-cemetery:omeka
    container_name: cimitero-omeka
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      OMEKA_DB_HOST: db
      OMEKA_DB_USER: omeka_user
      OMEKA_DB_PASSWORD: omeka_password
      OMEKA_DB_NAME: omeka_s
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "code=$$(curl -s -o /tmp/api.out -w '%{http_code}' http://localhost/api/items); grep -q '\"o:id\"' /tmp/api.out && [ \"$$code\" = \"200\" ]"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  frontend:
    build:
      context: ./cimitero-frontend
      dockerfile: Dockerfile.production
    image: mandringo02/demo-cemetery:frontend
    container_name: cimitero-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      OMEKA_INTERNAL_API_URL: http://omeka-app/api
      NEXT_PUBLIC_OMEKA_PUBLIC_URL: http://localhost:8080
      OMEKA_KEY_ID: GsAys5fqdD3nvGPXEQgexKefDfq58ODR
      OMEKA_KEY_SECRET: ZhbKwCsrsuOFDd83pXgZtyniLMJcnpEN
    depends_on:
      omeka-app:
        condition: service_healthy

  # One-shot: esegue l'analisi GIS portable e carica i GeoJSON come Item+Media
  # su Omeka S. Termina con exit 0 dopo l'upload. Idempotente.
  qgis-loader:
    build:
      context: ./qgis/portable
    image: mandringo02/demo-cemetery:qgis-loader
    container_name: cimitero-qgis-loader
    restart: "no"
    environment:
      OMEKA_INTERNAL_API_URL: http://omeka-app/api
      OMEKA_KEY_ID: GsAys5fqdD3nvGPXEQgexKefDfq58ODR
      OMEKA_KEY_SECRET: ZhbKwCsrsuOFDd83pXgZtyniLMJcnpEN
      ITEM_IDENTIFIER: cementerio_general_qgis_analysis
      ITEM_TITLE: "QGIS Analysis - Cementerio General"
    volumes:
      # Copia locale dei GeoJSON: utile per upload manuale in Omeka GUI
      - ./qgis/output:/tmp/out
    depends_on:
      omeka-app:
        condition: service_healthy

volumes:
  db_data: